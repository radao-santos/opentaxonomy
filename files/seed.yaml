seed_id: personal-finance-transactions
version: 1.0.0
type: domain
generated_by: prima-seed@1.0.0
description: >
  A domain-specific seed for categorizing personal bank
  transaction descriptions. Designed for the context of
  household budgeting and personal financial management.

context:
  Q0_answer: "Financial transactions — records of money moving in or out of a personal bank account"
  Q0b_answer: >
    Personal financial management / household budgeting.
    The tree reflects how a person thinks about their money:
    what did I spend it on, was it necessary, can I control it?

normalization_rules:
  - extract_merchant_from_sepa: true
  - extract_merchant_from_paypal: true
  - strip_dates_and_references: true
  - merge_card_terminal_variants: true
  - resolve_encoding_artifacts: true
  - flag_unidentifiable_paypal: true

levels:

  L1:
    dimension: "Direction of money flow"
    question: "Is money coming in or going out?"
    branches:
      - income
      - expenditure

  L2_income:
    dimension: "Source type"
    question: "What is the origin of this income?"
    branches:
      - employment
      - government_benefits
      - other_income

  L2_expenditure:
    dimension: "Degree of obligation"
    question: "How obligatory is this spending?"
    branches:
      - fixed_obligations
      - variable_necessities
      - discretionary
      - personal_transfers
      - cash_withdrawals

  L3_fixed_obligations:
    dimension: "Obligation category"
    question: "What life function does this fixed cost serve?"
    branches:
      - housing
      - telecommunications
      - insurance
      - digital_subscriptions
      - childcare_education
      - public_broadcasting
      - fitness_membership

  L3_variable_necessities:
    dimension: "Necessity category"
    question: "What essential need does this serve?"
    branches:
      - groceries
      - transport_local
      - fuel_vehicle
      - health_pharmacy
      - household_supplies

  L3_discretionary:
    dimension: "Spending category"
    question: "What type of discretionary activity is this?"
    branches:
      - dining_out
      - shopping_fashion
      - shopping_online_general
      - entertainment_leisure
      - travel_accommodation

edge_cases:
  - entity: "Amazon"
    issue: "Multi-category merchant — single transaction may span groceries, electronics, clothing"
    resolution: "Placed under shopping_online_general without line-item data"
    decided: true
  - entity: "Mueller/Müller"
    issue: "Sells cosmetics, household goods, toys, stationery — spans necessity and discretionary"
    resolution: "Placed under household_supplies as primary function"
    decided: true
  - entity: "Eurest Deutschland"
    issue: "Corporate canteen — quasi-necessary work meals vs. discretionary dining"
    resolution: "Placed under dining_out in personal budget context"
    decided: true
